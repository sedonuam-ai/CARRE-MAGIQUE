<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fond noir -->
  <rect width="512" height="512" rx="96" fill="#060709"/>
  <!-- Losange or extérieur -->
  <polygon points="256,40 472,256 256,472 40,256" fill="none" stroke="#f5b830" stroke-width="18"/>
  <!-- Losange or intérieur -->
  <polygon points="256,110 402,256 256,402 110,256" fill="none" stroke="#d48f14" stroke-width="10"/>
  <!-- Cercle central -->
  <circle cx="256" cy="256" r="70" fill="none" stroke="#f5b830" stroke-width="14"/>
  <!-- Croix centrale -->
  <line x1="256" y1="186" x2="256" y2="326" stroke="#f5b830" stroke-width="10" stroke-linecap="round"/>
  <line x1="186" y1="256" x2="326" y2="256" stroke="#f5b830" stroke-width="10" stroke-linecap="round"/>
  <!-- 4 points aux angles du losange intérieur -->
  <circle cx="256" cy="110" r="10" fill="#f5b830"/>
  <circle cx="402" cy="256" r="10" fill="#f5b830"/>
  <circle cx="256" cy="402" r="10" fill="#f5b830"/>
  <circle cx="110" cy="256" r="10" fill="#f5b830"/>
  <!-- Initiales SA -->
  <text x="256" y="272" text-anchor="middle" font-family="Georgia,serif" font-size="52" font-weight="bold" fill="#f5b830" letter-spacing="4">SA</text>
</svg>
