<html lang="fr">

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>

<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>

<title>SEDONU AZARAKOR</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg0:#060709;--bg1:#0d1016;--bg2:#131820;--bg3:#1a2230;
  --b0:#1e2838;--b1:#2e3d52;
  --g0:#7a5200;--g1:#d48f14;--g2:#f5b830;
  --t0:#eaf2ff;--t1:#8da4bc;--t2:#5a7590;
  --red:#e04040;
}
body{background:var(--bg0);color:var(--t0);font-family:'Courier New',monospace;min-height:100vh;padding-bottom:env(safe-area-inset-bottom)}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
button{font-family:'Courier New',monospace;cursor:pointer}
button:active{filter:brightness(1.2)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg0)}
::-webkit-scrollbar-thumb{background:var(--b0);border-radius:2px}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fadein{animation:fadein .25s ease}

header{background:var(--bg1);border-bottom:1px solid var(--b1);padding:16px 20px;text-align:center;position:sticky;top:0;z-index:10}
.hdr-sub{font-size:10px;letter-spacing:4px;color:var(--g1);margin-bottom:5px}
.hdr-title{font-size:clamp(16px,5vw,28px);font-weight:800;color:var(--g2);letter-spacing:4px}
.hdr-info{font-size:10px;color:var(--t1);margin-top:5px;letter-spacing:2px}

.wrap{max-width:860px;margin:0 auto;padding:16px 12px}
.card{background:var(--bg1);border:1px solid var(--b0);border-radius:10px;padding:16px;margin-bottom:12px}
.card.accent{border-color:var(--g1);box-shadow:0 0 20px #d48f1414}
.lbl{font-size:10px;letter-spacing:2.5px;color:var(--g1);text-transform:uppercase;margin-bottom:10px}

.input-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.num-input{width:56px;height:50px;text-align:center;font-size:22px;font-weight:800;
  background:var(--bg2);color:#fff;border:2px solid var(--b1);border-radius:8px;outline:none;font-family:'Courier New',monospace}
.num-input.hit{background:var(--g1);color:var(--bg0);border-color:var(--g2)}
.btn-primary{background:var(--g2);border:none;color:var(--bg0);padding:10px 20px;
  border-radius:7px;font-size:12px;font-weight:800;letter-spacing:.5px}
.btn-ghost{background:transparent;border:1px solid var(--b0);color:var(--t1);
  padding:10px 14px;border-radius:7px;font-size:12px}
.btn-sm{background:transparent;border:1px solid var(--b0);color:var(--t2);
  padding:4px 10px;border-radius:6px;font-size:10px}

.tirage-balls{display:flex;gap:7px;flex-wrap:wrap;margin-top:14px}
.ball{border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:800;font-family:'Courier New',monospace}
.ball-lg{width:46px;height:46px;font-size:18px;background:var(--g2);color:var(--bg0);border:2px solid var(--g2)}
.ball-sm{width:34px;height:34px;font-size:13px}
.ball-sm.hit{background:var(--g2);color:var(--bg0);border:2px solid var(--g2)}
.ball-sm.nohit{background:var(--bg3);color:var(--t0);border:2px solid var(--b1);text-shadow:0 1px 3px rgba(0,0,0,.6)}

.error{color:var(--red);font-size:12px;margin-top:10px}

.gains-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(92px,1fr));gap:8px}
.gain-card{background:var(--bg3);border-radius:8px;padding:12px 8px;text-align:center;border:1px solid var(--b1)}
.gain-card.win{border-color:var(--g1)}
.gain-lbl{font-size:11px;color:var(--t1);letter-spacing:1px;margin-bottom:4px;font-weight:700}
.gain-val{font-size:28px;font-weight:800}
.gain-val.win{color:var(--g2)}
.gain-val.zero{color:var(--t1)}
.gain-sub{font-size:10px;color:var(--t1);margin-top:2px}
.gain-sep{margin-top:8px;padding-top:8px;border-top:1px solid var(--b1)}
.gain-cumul{font-size:13px;color:var(--g2);font-weight:800}
.gain-cumul-lbl{font-size:10px;color:var(--t1)}

.bareme{display:flex;gap:6px;flex-wrap:wrap}
.bar-item{background:var(--bg2);border:1px solid var(--b0);border-radius:7px;padding:8px 12px;text-align:center;min-width:74px}
.bar-k{font-weight:700;font-size:13px}
.bar-v{color:var(--t1);font-size:11px;margin-top:2px}

.btn-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.mod-btn{position:relative;padding:14px 8px;background:var(--bg1);
  border:1px solid var(--b0);border-radius:9px;color:var(--t0);
  transition:border-color .15s,box-shadow .15s;outline:none}
.mod-btn.sel{background:#d48f1414;border-color:var(--g1);box-shadow:0 0 8px #d48f1428}
.mod-btn.match{border-color:var(--red);box-shadow:0 0 8px #e0404028}
.mod-num{font-size:26px;font-weight:700}
.mod-num.sel{color:var(--g2)}
.mod-lbl{font-size:11px;color:var(--t1);margin-top:1px;letter-spacing:1px}
.mod-sub{font-size:10px;color:var(--t1)}
.mod-gain{margin-top:6px;font-size:12px;font-weight:700}
.mod-gain.win{color:var(--g2)}
.mod-gain.zero{color:var(--t2)}
.temoin{position:absolute;top:7px;right:7px;width:8px;height:8px;border-radius:50%;
  background:var(--red);box-shadow:0 0 5px var(--red);animation:pulse 1.4s ease-in-out infinite}

.grilles-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.grilles-title{font-size:15px;font-weight:700;color:var(--g2);margin-top:2px}
.grilles-scroll{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));
  gap:6px;max-height:520px;overflow-y:auto;padding-right:2px}
.grille{border-radius:7px;padding:9px 10px}
.grille-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.grille-idx{font-size:10px;color:var(--t1)}
.grille-gain{font-size:10px;color:var(--g2);font-weight:700}
.grille-nums{display:flex;gap:5px;flex-wrap:wrap}
</style>
</head>

function setInput(i,v){
  const inp=[...state.inputs]; inp[i]=v; setState({inputs:inp,erreur:''});
  if(v.length>=2){ const nx=document.getElementById('t'+(i+1)); if(nx)nx.focus(); }
}

function toggleBtn(b){ setState({selBtn: state.selBtn===b?null:b}); }

// ═══════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════
function pad(n){ return String(n).padStart(2,'0'); }

function render(){
  const {inputs,tirage,cumul,derGain,erreur,showRes,selBtn} = state;
  const grilles = selBtn ? GD[selBtn] : [];

  let html = '';

  // ── SAISIE
  html += `<div class="card">
    <div class="lbl">Résultat Tirage Officiel</div>
    <div class="input-row">
      ${inputs.map((v,i)=>{
        const hit = tirage.includes(parseInt(v));
        return `<input class="num-input${hit?' hit':''}" id="t${i}" type="number" min="1" max="90"
          value="${v}" placeholder="N°${i+1}"
          oninput="setInput(${i},this.value)"
          onkeydown="if(event.key==='Enter')valider()"/>`;
      }).join('')}
      <button class="btn-primary" onclick="valider()">▶ VALIDER</button>
      <button class="btn-ghost" onclick="reset()">✕</button>
    </div>
    ${erreur?`<div class="error">${erreur}</div>`:''}
    ${tirage.length>0?`<div class="tirage-balls">
      ${[...tirage].sort((a,b)=>a-b).map(n=>`<span class="ball ball-lg">${pad(n)}</span>`).join('')}
    </div>`:''}
  </div>`;

  // ── GAINS
  if(showRes){
    html += `<div class="card accent fadein">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div class="lbl" style="margin-bottom:0">Vérification des Gains</div>
        <button class="btn-sm" onclick="resetCumul()">Réinit. cumuls</button>
      </div>
      <div class="gains-grid">
        ${[1,2,3,4,5,6,7,8,9].map(b=>`
          <div class="gain-card${derGain[b]>0?' win':''}">
            <div class="gain-lbl">BTN ${b}</div>
            <div class="gain-val${derGain[b]>0?' win':' zero'}">${derGain[b]}</div>
            <div class="gain-sub">ce tirage</div>
            <div class="gain-sep">
              <span class="gain-cumul">∑ ${cumul[b]}</span>
              <span class="gain-cumul-lbl"> cumul</span>
            </div>
          </div>`).join('')}
      </div>
    </div>`;
  }

  // ── BARÈME
  html += `<div class="card">
    <div class="lbl">Barème des Gains</div>
    <div class="bareme">
      ${[['5 bons','10 grilles','var(--g2)'],['4 bons','6 paires','var(--g1)'],
         ['3 bons','3 paires','var(--t0)'],['2 bons','1 paire','var(--t1)'],
         ['1 bon','—','var(--t1)']].map(([k,v,c])=>
        `<div class="bar-item"><div class="bar-k" style="color:${c}">${k}</div><div class="bar-v">${v}</div></div>`
      ).join('')}
    </div>
  </div>`;

  // ── BOUTONS MODULO
  html += `<div class="lbl">Sélection Modulo — 120 Grilles par Bouton</div>
  <div class="btn-grid">
    ${[1,2,3,4,5,6,7,8,9].map(b=>{
      const match=btnMatch(b,tirage), sel=selBtn===b, gain=derGain[b];
      return `<button class="mod-btn${sel?' sel':''}${match?' match':''}" onclick="toggleBtn(${b})">
        ${match?`<span class="temoin"></span>`:''}
        <div class="mod-num${sel?' sel':''}">${b}</div>
        <div class="mod-lbl">MODULO ${b}</div>
        <div class="mod-sub">120 grilles</div>
        ${showRes?`<div class="mod-gain${gain>0?' win':' zero'}">${gain>0?'+'+gain:'—'}</div>`:''}
      </button>`;
    }).join('')}
  </div>`;

  // ── GRILLES
  if(selBtn){
    html += `<div class="card fadein">
      <div class="grilles-header">
        <div>
          <div class="lbl" style="margin-bottom:2px">Bouton ${selBtn} · Modulo ${selBtn}</div>
          <div class="grilles-title">120 Combinaisons</div>
        </div>
        <button class="btn-ghost" style="font-size:11px;padding:5px 12px" onclick="toggleBtn(${selBtn})">✕ Fermer</button>
      </div>
      <div class="grilles-scroll">
        ${grilles.map((g,idx)=>{
          const bons=nbBons(g,tirage), gain=bonsToGains(bons), hit=bons>=2;
          const bg = hit?'background:#d48f140a;':'background:var(--bg2);';
          return `<div class="grille" style="${bg}border:1px solid ${borderBons(bons)}">
            <div class="grille-meta">
              <span class="grille-idx">#${String(idx+1).padStart(3,'0')}</span>
              ${hit?`<span class="grille-gain">+${gain} grille${gain>1?'s':''}</span>`:''}
            </div>
            <div class="grille-nums">
              ${g.map(n=>{
                const h=tirage.includes(n);
                return `<span class="ball ball-sm ${h?'hit':'nohit'}">${pad(n)}</span>`;
              }).join('')}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  document.getElementById('app').innerHTML = html;

  // Restore focus on active input
  if(document.activeElement && document.activeElement.tagName==='INPUT') return;
}

// ═══════════════════════════════════════════════════════════
//  INIT + SERVICE WORKER
// ═══════════════════════════════════════════════════════════
render();

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js')
    .then(()=>console.log('SW registered'))
    .catch(e=>console.log('SW error',e));
}
</script>
</body>
</html>
